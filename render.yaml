services:
  - type: web
    name: marble-polish-backend
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: marble-polish-db
          property: connectionString
    routes:
      - path: /api
        matchType: prefix

databases:
  - name: marble-polish-db
    engine: mysql
    version: "8"
    plan: free
    initialQuery: |
      CREATE DATABASE IF NOT EXISTS marble_polish;
